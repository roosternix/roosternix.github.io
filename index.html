<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YOUR NAME — Main Menu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --panel: #0f0f1a;
    --border: #2a2a4a;
    --amber: #f5a623;
    --amber-dim: #a06b10;
    --green: #39ff14;
    --green-dim: #1a7a08;
    --text: #e8e0c8;
    --text-dim: #7a7060;
    --scan: rgba(0,0,0,0.18);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
  }

  /* CRT scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      var(--scan) 2px,
      var(--scan) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  /* CRT vignette */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
    z-index: 999;
  }

  .screen {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: 2rem;
  }

  /* Pixel border frame */
  .frame {
    border: 3px solid var(--amber);
    box-shadow:
      0 0 0 6px var(--bg),
      0 0 0 9px var(--border),
      0 0 30px rgba(245,166,35,0.3),
      inset 0 0 30px rgba(245,166,35,0.05);
    padding: 3rem 4rem;
    min-width: 520px;
    max-width: 640px;
    width: 100%;
    position: relative;
    animation: flicker 8s infinite;
  }

  @keyframes flicker {
    0%, 95%, 97%, 99%, 100% { opacity: 1; }
    96% { opacity: 0.92; }
    98% { opacity: 0.96; }
  }

  /* Corner decorations */
  .frame::before, .frame::after {
    content: '◆';
    position: absolute;
    color: var(--amber);
    font-size: 10px;
    line-height: 1;
  }
  .frame::before { top: 8px; left: 12px; }
  .frame::after { bottom: 8px; right: 12px; }

  .title-section {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .title-pre {
    font-family: 'VT323', monospace;
    font-size: 18px;
    color: var(--text-dim);
    letter-spacing: 4px;
    margin-bottom: 0.5rem;
    display: block;
  }

  h1 {
    font-size: clamp(18px, 3vw, 26px);
    color: var(--amber);
    text-shadow:
      0 0 10px rgba(245,166,35,0.8),
      0 0 30px rgba(245,166,35,0.4);
    letter-spacing: 2px;
    line-height: 1.6;
    animation: pulse-glow 3s ease-in-out infinite;
  }

  @keyframes pulse-glow {
    0%, 100% { text-shadow: 0 0 10px rgba(245,166,35,0.8), 0 0 30px rgba(245,166,35,0.4); }
    50% { text-shadow: 0 0 20px rgba(245,166,35,1), 0 0 50px rgba(245,166,35,0.6), 0 0 80px rgba(245,166,35,0.2); }
  }

  .title-divider {
    margin: 1.5rem 0;
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--border);
  }
  .title-divider span { flex: 1; height: 1px; background: var(--border); }
  .title-divider i { font-style: normal; color: var(--amber-dim); font-size: 8px; }

  /* Menu items */
  nav { display: flex; flex-direction: column; gap: 0; }

  .menu-item {
    display: flex;
    align-items: center;
    gap: 1.2rem;
    padding: 0.9rem 1rem;
    cursor: pointer;
    position: relative;
    text-decoration: none;
    color: var(--text);
    font-size: 11px;
    letter-spacing: 1px;
    transition: color 0.1s;
    border: 1px solid transparent;
    user-select: none;
  }

  .menu-item:hover, .menu-item.active {
    color: var(--green);
    border-color: var(--green-dim);
    background: rgba(57,255,20,0.05);
    text-shadow: 0 0 8px rgba(57,255,20,0.6);
  }

  .cursor {
    width: 14px;
    color: var(--green);
    text-shadow: 0 0 8px var(--green);
    opacity: 0;
    font-size: 12px;
    animation: blink 0.8s step-end infinite;
  }

  .menu-item.active .cursor, .menu-item:hover .cursor {
    opacity: 1;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .menu-num {
    color: var(--text-dim);
    font-size: 9px;
    min-width: 28px;
  }

  .menu-item:hover .menu-num,
  .menu-item.active .menu-num {
    color: var(--green-dim);
  }

  .menu-label { flex: 1; }

  .menu-arrow {
    color: var(--text-dim);
    font-size: 10px;
    opacity: 0;
  }
  .menu-item:hover .menu-arrow,
  .menu-item.active .menu-arrow {
    opacity: 1;
    color: var(--green);
  }

  /* Footer */
  .footer-bar {
    margin-top: 2rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer-hint {
    font-family: 'VT323', monospace;
    font-size: 14px;
    color: var(--text-dim);
    letter-spacing: 2px;
  }

  .version {
    font-size: 7px;
    color: var(--text-dim);
  }

  /* Stars background */
  .stars {
    position: fixed;
    inset: 0;
    z-index: -1;
    overflow: hidden;
  }
  .star {
    position: absolute;
    width: 1px;
    height: 1px;
    background: var(--text-dim);
    border-radius: 50%;
    animation: twinkle var(--d, 3s) var(--del, 0s) ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    from { opacity: 0.1; }
    to { opacity: 0.6; }
  }

  /* Press start animation */
  .press-start {
    text-align: center;
    margin-top: 1.5rem;
    font-family: 'VT323', monospace;
    font-size: 16px;
    color: var(--amber-dim);
    letter-spacing: 3px;
    animation: blink 1.2s step-end infinite;
  }

  /* Keyboard hint */
  .key-hint {
    display: inline-block;
    border: 1px solid var(--border);
    padding: 1px 5px;
    font-size: 8px;
    color: var(--text-dim);
    border-radius: 2px;
    margin: 0 2px;
  }

  @media (max-width: 560px) {
    .frame { min-width: unset; padding: 2rem 1.5rem; }
    h1 { font-size: 14px; }
    .menu-item { font-size: 9px; }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="screen">
  <div class="frame">
    <div class="title-section">
      <span class="title-pre">— WELCOME TO —</span>
      <h1>YOUR NAME</h1>
      <div class="title-divider">
        <span></span><i>★</i><span></span>
      </div>
    </div>

    <nav id="menu">
      <a class="menu-item active" href="links.html">
        <span class="cursor">▶</span>
        <span class="menu-num">01</span>
        <span class="menu-label">LINKS</span>
        <span class="menu-arrow">»</span>
      </a>
      <a class="menu-item" href="projects.html">
        <span class="cursor">▶</span>
        <span class="menu-num">02</span>
        <span class="menu-label">PROJECTS</span>
        <span class="menu-arrow">»</span>
      </a>
      <a class="menu-item" href="about.html">
        <span class="cursor">▶</span>
        <span class="menu-num">03</span>
        <span class="menu-label">ABOUT ME</span>
        <span class="menu-arrow">»</span>
      </a>
      <a class="menu-item" href="donate.html">
        <span class="cursor">▶</span>
        <span class="menu-num">04</span>
        <span class="menu-label">DONATE</span>
        <span class="menu-arrow">»</span>
      </a>
    </nav>

    <div class="footer-bar">
      <span class="footer-hint">
        <span class="key-hint">↑↓</span> MOVE &nbsp;
        <span class="key-hint">ENTER</span> SELECT
      </span>
      <span class="version">V 1.0.0</span>
    </div>
  </div>
  <p class="press-start">▼ SELECT A DESTINATION ▼</p>
</div>

<script>
  // Generate stars
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--del:${Math.random()*3}s;`;
    starsEl.appendChild(s);
  }

  // Keyboard navigation
  const items = Array.from(document.querySelectorAll('.menu-item'));
  let current = 0;

  function setActive(idx) {
    items.forEach(i => i.classList.remove('active'));
    items[idx].classList.add('active');
    current = idx;
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowDown') { setActive((current + 1) % items.length); e.preventDefault(); }
    if (e.key === 'ArrowUp') { setActive((current - 1 + items.length) % items.length); e.preventDefault(); }
    if (e.key === 'Enter') { items[current].click(); }
  });

  items.forEach((item, idx) => {
    item.addEventListener('mouseenter', () => setActive(idx));
  });
</script>
</body>
</html>
