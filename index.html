<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROOSTERNIX — MAIN MENU</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#7dff4f;--green2:#4db82e;--glow:rgba(125,255,79,0.5);
  --panel:rgba(4,6,14,0.88);--chrome:#9aa4b4;--dim:#3a4050;
  --text:#dde4ee;--textdim:#4a5565;
}
html,body{height:100%;overflow:hidden;background:#000;font-family:'Rajdhani',sans-serif}

/* ── SPACE CANVAS ── */
canvas{position:fixed;inset:0;z-index:0}

/* ── HUD CORNERS ── */
.hud{position:fixed;font-family:'Orbitron',sans-serif;font-size:7px;letter-spacing:3px;color:var(--dim);z-index:20;pointer-events:none}
.hud.tl{top:14px;left:18px}.hud.tr{top:14px;right:18px}
.hud.bl{bottom:14px;left:18px}.hud.br{bottom:14px;right:18px}

/* scan lines */
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.08) 3px,rgba(0,0,0,0.08) 4px);pointer-events:none;z-index:15}

/* ── SCREEN ── */
.screen{position:relative;z-index:10;height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}

/* ── CONTAINER ── */
.wrap{width:100%;max-width:560px}

.eyebrow{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:7px;color:var(--green2);display:block;margin-bottom:6px;padding-left:4px}

/* ── MAIN PANEL ── */
.panel{
  background:var(--panel);
  border:1px solid rgba(125,255,79,0.18);
  border-top:2px solid var(--green);
  border-left:2px solid var(--green);
  clip-path:polygon(0 0,calc(100% - 34px) 0,100% 34px,100% 100%,34px 100%,0 calc(100% - 34px));
  box-shadow:0 0 80px rgba(0,0,0,0.95),0 0 30px rgba(125,255,79,0.06),inset 0 0 60px rgba(0,10,40,0.4);
  position:relative;
  animation:flicker 14s ease-in-out infinite;
}
@keyframes flicker{0%,88%,91%,94%,100%{opacity:1}89%{opacity:.93}92%{opacity:.97}}
.panel::before{content:'';position:absolute;top:0;left:0;right:34px;height:2px;background:linear-gradient(90deg,var(--green),rgba(125,255,79,.15) 70%,transparent);box-shadow:0 0 14px var(--glow)}
.panel::after{content:'';position:absolute;top:2px;left:0;bottom:34px;width:2px;background:linear-gradient(180deg,var(--green),transparent)}

.inner{padding:2.4rem 2.8rem 2rem}

/* ── TITLE ── */
h1{
  font-family:'Orbitron',sans-serif;font-size:clamp(28px,5vw,44px);font-weight:900;
  letter-spacing:5px;line-height:1;
  background:linear-gradient(180deg,#fff 0%,#ccd3de 28%,#7a8898 60%,#ccd3de 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 10px rgba(125,255,79,.25));
  animation:cglow 4s ease-in-out infinite alternate;
}
@keyframes cglow{from{filter:drop-shadow(0 0 6px rgba(125,255,79,.15))}to{filter:drop-shadow(0 0 22px rgba(125,255,79,.4))}}
.rule{margin:14px 0 2rem;height:1px;background:linear-gradient(90deg,var(--green2),rgba(125,255,79,.1) 60%,transparent)}

/* ── MENU ── */
nav{display:flex;flex-direction:column;gap:2px;margin-bottom:1.8rem}
.item{
  display:flex;align-items:center;gap:1.1rem;
  padding:.8rem .8rem;
  text-decoration:none;color:var(--text);
  font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;letter-spacing:4px;
  border:1px solid transparent;border-left:2px solid transparent;
  transition:all .1s;position:relative;cursor:pointer;
}
.item::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,rgba(125,255,79,.07),transparent);opacity:0;transition:opacity .12s}
.item:hover,.item.on{color:var(--green);border-color:rgba(125,255,79,.14);border-left-color:var(--green);text-shadow:0 0 16px var(--glow)}
.item:hover::before,.item.on::before{opacity:1}
.sel{font-size:13px;color:var(--green);text-shadow:0 0 10px var(--glow);opacity:0;animation:sb .7s step-end infinite;min-width:14px}
.item.on .sel,.item:hover .sel{opacity:1}
@keyframes sb{0%,100%{opacity:1}50%{opacity:0}}
.num{font-size:8px;color:var(--textdim);min-width:26px;font-weight:400;letter-spacing:2px}
.item:hover .num,.item.on .num{color:var(--green2)}
.lbl{flex:1}
.arr{font-size:10px;color:transparent}
.item:hover .arr,.item.on .arr{color:var(--green)}

/* ── FOOTER ── */
.foot{border-top:1px solid var(--dim);padding-top:1.1rem;display:flex;justify-content:space-between;align-items:center}
.hints{font-family:'Orbitron',sans-serif;font-size:7px;letter-spacing:3px;color:var(--textdim);display:flex;gap:14px}
.k{display:inline-block;border:1px solid var(--dim);padding:2px 5px;font-size:7px;color:var(--chrome);margin-right:4px}
.ready{font-family:'Orbitron',sans-serif;font-size:7px;letter-spacing:4px;color:var(--green2);animation:sb 1.6s step-end infinite}

@media(max-width:520px){.inner{padding:1.5rem 1.4rem 1.2rem}.panel{clip-path:none}h1{font-size:22px}.item{font-size:9px;letter-spacing:2px}}
</style>
</head>
<body>

<canvas id="space"></canvas>

<div class="hud tl">SYS::ONLINE</div>
<div class="hud tr">roosternix.github.io</div>
<div class="hud bl">SECTOR 7 // MAIN MENU</div>
<div class="hud br" id="clk">--:--:--</div>

<div class="screen">
  <div class="wrap">
    <span class="eyebrow">— SELECT DESTINATION —</span>
    <div class="panel">
      <div class="inner">
        <h1>ROOSTERNIX</h1>
        <div class="rule"></div>
        <nav id="nav">
          <a class="item on" href="links.html"><span class="sel">▶</span><span class="num">01</span><span class="lbl">LINKS</span><span class="arr">»</span></a>
          <a class="item" href="projects.html"><span class="sel">▶</span><span class="num">02</span><span class="lbl">PROJECTS</span><span class="arr">»</span></a>
          <a class="item" href="about.html"><span class="sel">▶</span><span class="num">03</span><span class="lbl">ABOUT ME</span><span class="arr">»</span></a>
          <a class="item" href="donate.html"><span class="sel">▶</span><span class="num">04</span><span class="lbl">DONATE</span><span class="arr">»</span></a>
        </nav>
        <div class="foot">
          <div class="hints"><span><span class="k">↑↓</span>MOVE</span><span><span class="k">↵</span>SELECT</span></div>
          <span class="ready">READY_</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
/* ── SPACE SCENE ── */
const cv = document.getElementById('space');
const cx = cv.getContext('2d');
let W,H;

function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight}
resize();window.addEventListener('resize',resize);

/* Stars */
const STARS=[];
for(let i=0;i<320;i++){
  STARS.push({x:Math.random(),y:Math.random(),r:Math.random()*1.4+.2,s:Math.random()*.6+.2,t:Math.random()*Math.PI*2,dt:(.002+Math.random()*.004)*(Math.random()<.5?1:-1)})
}

/* Planets */
const PLANETS=[
  {x:.82,y:.18,r:38,col:['#1a3a5c','#1e4570','#2a5a8a'],ring:true,ringCol:'rgba(100,160,220,0.18)',speed:.00008,angle:0},
  {x:.12,y:.75,r:22,col:['#3a1a1a','#5a2a2a','#7a3a2a'],ring:false,speed:.00013,angle:1.2},
  {x:.9,y:.78,r:14,col:['#1a2a1a','#2a4a2a','#3a6a3a'],ring:false,speed:.00018,angle:2.4},
];

/* Spaceship */
const ship={x:W*.3,y:H*.6,vx:.28,vy:-.18,angle:0,trail:[],targetX:0,targetY:0,timer:0};
function newTarget(){ship.targetX=W*(.1+Math.random()*.8);ship.targetY=H*(.1+Math.random()*.8)}
newTarget();

function drawStar(x,y,r,alpha){
  cx.save();cx.globalAlpha=alpha;
  cx.fillStyle='#fff';
  cx.shadowColor='#aaf';cx.shadowBlur=r*3;
  cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.fill();
  cx.restore();
}

function drawPlanet(p,t){
  const px=p.x*W,py=p.y*H;
  // subtle orbit wobble
  const ox=Math.sin(t*p.speed*W)*18,oy=Math.cos(t*p.speed*H*.6)*10;
  const fx=px+ox,fy=py+oy;

  cx.save();
  // glow
  const grd=cx.createRadialGradient(fx,fy,0,fx,fy,p.r*2.5);
  grd.addColorStop(0,p.col[0]+'44');grd.addColorStop(1,'transparent');
  cx.fillStyle=grd;cx.beginPath();cx.arc(fx,fy,p.r*2.5,0,Math.PI*2);cx.fill();

  // body
  const bg=cx.createRadialGradient(fx-p.r*.3,fy-p.r*.3,0,fx,fy,p.r);
  bg.addColorStop(0,p.col[2]);bg.addColorStop(.6,p.col[1]);bg.addColorStop(1,p.col[0]);
  cx.fillStyle=bg;cx.beginPath();cx.arc(fx,fy,p.r,0,Math.PI*2);cx.fill();

  // atmosphere rim
  cx.globalAlpha=.18;
  const rim=cx.createRadialGradient(fx,fy,p.r*.7,fx,fy,p.r*1.15);
  rim.addColorStop(0,'transparent');rim.addColorStop(1,p.col[2]);
  cx.fillStyle=rim;cx.beginPath();cx.arc(fx,fy,p.r*1.15,0,Math.PI*2);cx.fill();
  cx.globalAlpha=1;

  // ring
  if(p.ring){
    cx.save();cx.translate(fx,fy);cx.scale(1,.28);
    cx.strokeStyle=p.ringCol;cx.lineWidth=p.r*.55;cx.globalAlpha=.55;
    cx.beginPath();cx.ellipse(0,0,p.r*1.85,p.r*1.85,0,0,Math.PI*2);cx.stroke();
    cx.restore();
  }
  cx.restore();
}

function drawShip(x,y,angle){
  cx.save();cx.translate(x,y);cx.rotate(angle);
  // engine glow
  cx.shadowColor='#7dff4f';cx.shadowBlur=14;
  // body
  cx.fillStyle='#8aaccc';
  cx.beginPath();cx.moveTo(14,0);cx.lineTo(-10,7);cx.lineTo(-6,0);cx.lineTo(-10,-7);cx.closePath();cx.fill();
  // cockpit
  cx.fillStyle='#5df5ff';cx.globalAlpha=.9;
  cx.beginPath();cx.ellipse(4,0,5,3.5,0,0,Math.PI*2);cx.fill();cx.globalAlpha=1;
  // engine exhaust
  cx.fillStyle='#7dff4f';cx.shadowBlur=20;
  cx.beginPath();cx.moveTo(-8,0);cx.lineTo(-18,3.5);cx.lineTo(-18,-3.5);cx.closePath();cx.fill();
  cx.restore();
}

let t=0;
function frame(){
  requestAnimationFrame(frame);
  t++;

  // background
  cx.fillStyle='#000005';cx.fillRect(0,0,W,H);

  // nebula
  const neb=cx.createRadialGradient(W*.6,H*.3,0,W*.6,H*.3,W*.5);
  neb.addColorStop(0,'rgba(10,0,40,0)');neb.addColorStop(.4,'rgba(20,0,60,.06)');neb.addColorStop(1,'transparent');
  cx.fillStyle=neb;cx.fillRect(0,0,W,H);

  // stars
  for(const s of STARS){
    s.t+=s.dt;
    const a=.3+Math.sin(s.t)*.25+.2;
    drawStar(s.x*W,s.y*H,s.r,Math.min(1,a));
  }

  // planets
  for(const p of PLANETS) drawPlanet(p,t);

  // ship movement
  const dx=ship.targetX-ship.x,dy=ship.targetY-ship.y;
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<60){newTarget()}
  const spd=.6;
  ship.vx+=(dx/dist)*spd*.05;ship.vy+=(dy/dist)*spd*.05;
  const vmag=Math.sqrt(ship.vx**2+ship.vy**2);
  if(vmag>spd){ship.vx=ship.vx/vmag*spd;ship.vy=ship.vy/vmag*spd}
  ship.x+=ship.vx;ship.y+=ship.vy;
  ship.angle=Math.atan2(ship.vy,ship.vx);

  // trail
  ship.trail.push({x:ship.x,y:ship.y,a:.6});
  if(ship.trail.length>38) ship.trail.shift();
  for(let i=0;i<ship.trail.length;i++){
    const tr=ship.trail[i];const prog=i/ship.trail.length;
    cx.save();cx.globalAlpha=tr.a*prog*.5;
    cx.fillStyle='#7dff4f';cx.shadowColor='#7dff4f';cx.shadowBlur=6;
    cx.beginPath();cx.arc(tr.x,tr.y,1.2*prog,0,Math.PI*2);cx.fill();cx.restore();
  }

  drawShip(ship.x,ship.y,ship.angle);
}
frame();

/* ── CLOCK & NAV ── */
setInterval(()=>document.getElementById('clk').textContent=new Date().toTimeString().slice(0,8),1000);
const items=[...document.querySelectorAll('.item')];let cur=0;
function setA(i){items.forEach(el=>el.classList.remove('on'));items[i].classList.add('on');cur=i}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowDown'){setA((cur+1)%items.length);e.preventDefault()}
  if(e.key==='ArrowUp'){setA((cur-1+items.length)%items.length);e.preventDefault()}
  if(e.key==='Enter') items[cur].click()
});
items.forEach((el,i)=>el.addEventListener('mouseenter',()=>setA(i)));
</script>
</body>
</html>
